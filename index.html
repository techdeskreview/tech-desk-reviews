            }, [isOpen, onClose]);

            if (!isOpen) return null;
            const navigateTo = (view, cat) => { setCurrentView(view); if (cat) setSelectedCategory(cat); onClose(); };

            return (
                <div ref={menuRef} className="fixed inset-0 z-[9999] bg-[#0b0f14] flex flex-col animate-in slide-in-from-right duration-300 overflow-y-auto" role="dialog" aria-modal="true" aria-label="Mobile Navigation Menu">
                    <div className="h-16 px-6 flex items-center justify-between border-b border-[#1f2933]">
                        <span className="text-lg font-black uppercase text-slate-500 tracking-widest">Menu</span>
                        <button onClick={onClose} className="text-white p-2 hover:bg-white/10 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="Close Menu"><X size={32} /></button>
                    </div>
                    <div className="flex-1 flex flex-col p-8 gap-8 justify-center items-center">
                        <button onClick={() => navigateTo('categories')} className="group flex items-center gap-4 text-3xl font-black text-white hover:text-[#FFD814] transition-colors focus:outline-none focus:underline"><LayoutGrid size={32} className="text-blue-500 group-hover:text-[#FFD814]" /> Categories</button>
                        <button onClick={() => navigateTo('about')} className="text-2xl font-bold text-slate-400 hover:text-white transition-colors focus:outline-none focus:underline">About Us</button>
                        <button onClick={() => navigateTo('privacy')} className="text-2xl font-bold text-slate-400 hover:text-white transition-colors focus:outline-none focus:underline">Privacy Policy</button>
                        <button onClick={() => navigateTo('disclaimer')} className="text-2xl font-bold text-slate-400 hover:text-white transition-colors focus:outline-none focus:underline">Affiliate Disclaimer</button>
                    </div>
                    <div className="p-8 text-center bg-[#111827]"><p className="text-xs font-bold text-slate-600 uppercase tracking-[0.3em]">Professional Gear Analysis</p></div>
                </div>
            );
        };

        const CategoriesView = ({ setCurrentView, setSelectedCategory, searchQuery, setSearchQuery, onSearchSubmit }) => (
            <div className="max-w-6xl mx-auto px-6 py-12 min-h-screen animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="mb-12 text-center max-w-2xl mx-auto">
                    <h1 className="text-4xl font-black text-white mb-8">Browse Categories</h1>
                    <div className="relative group">
                        <input type="text" placeholder="Search for a specific product..." className="w-full bg-[#111827] border border-[#1f2933] text-white py-4 pl-12 pr-12 rounded-full focus:border-blue-500 outline-none transition-all shadow-lg text-lg" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && onSearchSubmit()} aria-label="Search Categories" />
                        <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" size={20} />
                        {searchQuery && <button className="absolute right-4 top-1/2 -translate-y-1/2 bg-[#FFD814] text-black p-1 rounded-full hover:bg-yellow-400 transition-colors focus:outline-none" onClick={onSearchSubmit} aria-label="Submit Search"><ArrowRight size={20} /></button>}
                    </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {CATEGORIES.map((cat) => (
                        <div key={cat.id} onClick={handleActivate(() => { setSelectedCategory(cat.id); setCurrentView('home'); setSearchQuery(''); })} onKeyDown={handleActivate(() => { setSelectedCategory(cat.id); setCurrentView('home'); setSearchQuery(''); })} className="bg-[#111827] border border-[#1f2933] p-8 rounded-2xl cursor-pointer hover:border-blue-500/50 hover:bg-[#161e31] transition-all group focus:outline-none focus:ring-2 focus:ring-blue-500" role="button" tabIndex={0} aria-label={`View ${cat.label} category`}>
                            <div className="mb-6 w-14 h-14 bg-black/40 rounded-xl flex items-center justify-center text-blue-500 group-hover:text-[#FFD814] group-hover:scale-110 transition-all"><cat.icon size={32} /></div>
                            <h3 className="text-2xl font-bold text-white mb-2">{cat.label}</h3>
                            <p className="text-slate-500 font-medium">{cat.desc}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const HomeView = ({ products, selectedCategory, searchQuery, setSelectedCategory, setSearchQuery, setSelectedProduct, setCurrentView }) => {
            const filteredProducts = useMemo(() => {
                let filtered = products;
                if (selectedCategory !== 'All') filtered = filtered.filter(p => p.category === selectedCategory);
                if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
                return filtered;
            }, [products, selectedCategory, searchQuery]);

            return (
                <div className="max-w-6xl mx-auto px-6 py-12 animate-in fade-in">
                    <header className="mb-16 text-center md:text-left">
                        <h1 className="text-5xl md:text-7xl font-bold text-white mb-4 tracking-tight">Work <span className="text-blue-500 italic">Elevated.</span></h1>
                        <div className="flex flex-wrap gap-2 justify-center md:justify-start items-center">
                            <span className="text-slate-400 text-lg uppercase tracking-[0.2em] font-medium">Professional gear analysis</span>
                            {(selectedCategory !== 'All' || searchQuery) && (
                                <div className="ml-0 md:ml-4 flex gap-2 mt-4 md:mt-0">
                                    {selectedCategory !== 'All' && !searchQuery && <button onClick={() => setSelectedCategory('All')} className="inline-flex items-center gap-2 bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 hover:bg-blue-500/20 transition-colors focus:outline-none">{selectedCategory} <X size={14} /></button>}
                                    {searchQuery && <button onClick={() => setSearchQuery('')} className="inline-flex items-center gap-2 bg-yellow-500/10 text-yellow-400 px-3 py-1 rounded-full border border-yellow-500/20 hover:bg-yellow-500/20 transition-colors focus:outline-none">Search: "{searchQuery}" <X size={14} /></button>}
                                </div>
                            )}
                        </div>
                    </header>
                    {filteredProducts.length > 0 ? (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {filteredProducts.map(product => (
                                <div key={product.id} onClick={handleActivate(() => { setSelectedProduct(product); setCurrentView('review'); })} onKeyDown={handleActivate(() => { setSelectedProduct(product); setCurrentView('review'); })} className="bg-[#111827] border border-[#1f2933] rounded-xl overflow-hidden cursor-pointer group hover:border-blue-500/50 transition-all flex flex-col focus:outline-none focus:ring-2 focus:ring-blue-500" role="button" tabIndex={0} aria-label={`Read review for ${product.name}`}>
                                    <div className="relative aspect-[4/5] bg-gray-900 overflow-hidden">
                                        <ImageWithSkeleton src={product.image} alt={product.name} className="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" />
                                        <span className="absolute top-3 left-3 bg-black/80 text-white text-[10px] font-bold uppercase px-2 py-1 tracking-widest backdrop-blur-md">{product.category}</span>
                                    </div>
                                    <div className="p-6 flex flex-col flex-grow">
                                        <StarRating rating={product.rating} />
                                        <h3 className="text-xl font-bold text-white mb-2 leading-tight">{product.name}</h3>
                                        <p className="text-sm text-slate-400 mb-6 flex-grow line-clamp-2">{product.verdict}</p>
                                        <div className="mt-auto"><AmazonBtn link={product.amazonLink} /></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-center py-20 text-slate-500"><p className="text-xl mb-4">No products found.</p><button onClick={() => {setSearchQuery(''); setSelectedCategory('All');}} className="text-blue-500 underline hover:text-white focus:outline-none">Reset All Filters</button></div>
                    )}
                </div>
            );
        };

        const ReviewView = ({ product, setCurrentView }) => {
            useEffect(() => { if (!product) setCurrentView('home'); }, [product, setCurrentView]);
            if (!product) return null;

            return (
                <div className="max-w-3xl mx-auto px-6 py-12 animate-in slide-in-from-bottom-8">
                    <div className="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-slate-500 mb-8">
                        <button className="hover:text-white cursor-pointer focus:outline-none" onClick={() => setCurrentView('home')}>Home</button> <ChevronRight size={12} /> <span className="text-blue-500">{product.category}</span>
                    </div>
                    <h1 className="text-4xl md:text-6xl font-black text-white mb-8 leading-[1.1]">{product.name}</h1>
                    <div className="mb-12 aspect-[2/3] w-full bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-white/5 relative group">
                        <ImageWithSkeleton src={product.image} className="w-full h-full object-cover" alt={product.name} />
                    </div>
                    <div className="bg-[#111827] border-l-4 border-blue-500 p-8 rounded-r-xl mb-12">
                        <div className="flex justify-between items-start mb-6"><h3 className="text-xs font-black uppercase text-blue-500 tracking-widest">Verdict</h3><div className="bg-white text-black px-3 py-1 font-black rounded text-lg">{product.rating}/5</div></div>
                        <p className="text-xl text-white font-medium italic mb-8">"{product.verdict}"</p>
                        <AmazonBtn link={product.amazonLink} />
                        <p className="mt-4 text-xs font-bold text-slate-500 uppercase tracking-widest text-center border-t border-[#1f2933] pt-4">
                            Ideal for: <span className="text-slate-300">{product.bestFor}</span>
                        </p>
                    </div>
                    <div className="prose prose-invert max-w-none text-lg text-slate-300 mb-16">
                        {/* Se houver um artigo completo, renderiza ele. Caso contrário, usa os resumos. */}
                        {product.fullArticle ? (
                            product.fullArticle
                        ) : (
                            <>
                                <p>{product.summary}</p>
                                <h2 className="text-white font-bold mt-12 mb-6 tracking-tight flex items-center gap-3">
                                    <span className="w-8 h-1 bg-blue-500 rounded-full"></span> Why We Picked It
                                </h2>
                                <p>{product.whyWePicked || "Selected for its exceptional balance of performance and build quality suitable for professional workflows."}</p>
                            </>
                        )}

                        {/* SEÇÃO PRÓS & CONTRAS DINÂMICA (Sempre visível) */}
                        {(product.pros || product.cons) && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-12 mb-8">
                                {product.pros && (
                                    <div className="bg-green-950/10 border border-green-500/20 p-6 rounded-xl">
                                        <h4 className="flex items-center gap-2 text-green-400 font-black uppercase tracking-widest text-[10px] mb-4">
                                            <Check size={14} strokeWidth={4} /> The Pros
                                        </h4>
                                        <ul className="space-y-3 text-sm text-slate-300 font-medium">
                                            {product.pros.map((p, i) => <li key={i} className="flex gap-2"><span className="text-green-500/50">•</span> {p}</li>)}
                                        </ul>
                                    </div>
                                )}
                                {product.cons && (
                                    <div className="bg-red-950/10 border border-red-500/20 p-6 rounded-xl">
                                        <h4 className="flex items-center gap-2 text-red-400 font-black uppercase tracking-widest text-[10px] mb-4">
                                            <X size={14} strokeWidth={4} /> The Cons
                                        </h4>
                                        <ul className="space-y-3 text-sm text-slate-300 font-medium">
                                            {product.cons.map((c, i) => <li key={i} className="flex gap-2"><span className="text-red-500/50">•</span> {c}</li>)}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    <DecisionCard link={product.amazonLink} />
                </div>
            );
        };

        const StaticView = ({ title, content, setCurrentView }) => (
            <div className="max-w-3xl mx-auto px-6 py-20 min-h-screen animate-in fade-in">
                <button onClick={() => setCurrentView('home')} className="mb-8 text-xs font-bold text-blue-500 uppercase tracking-widest hover:underline focus:outline-none">&larr; Back Home</button>
                <h1 className="text-4xl font-black text-white mb-8 pb-4 border-b border-[#1f2933]">{title}</h1>
                <div className="prose prose-invert prose-lg text-slate-400 leading-relaxed space-y-6">{content}</div>
            </div>
        );

        // --- APP ---
        const EditorialDarkBlog = () => {
            const [currentView, setCurrentView] = useState('home');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [showCookieBanner, setShowCookieBanner] = useState(false);

            useEffect(() => { safeScrollToTop(); }, [currentView, selectedCategory]);
            useEffect(() => { const c = safeLocalStorage.getItem('techdesk_consent'); if (!c) setTimeout(() => setShowCookieBanner(true), 1000); }, []);
            const acceptCookies = () => { safeLocalStorage.setItem('techdesk_consent', 'true'); setShowCookieBanner(false); };

            const handleSearchSubmit = () => {
                if (!searchQuery.trim()) return;
                setIsSearchOpen(false);
                setSelectedCategory('All');
                setCurrentView('home');
            };

            const handleReset = () => {
                setCurrentView('home');
                setSelectedCategory('All');
                setSearchQuery('');
            };

            const staticContent = {
                about: (
                    <>
                        <p><strong>Tech Desk Review</strong> is an independent editorial publication dedicated to the intersection of productivity, ergonomics, and workspace aesthetics. We believe that the environment you work in directly influences the quality of your output.</p>
                        <p>Our mission is to cut through the marketing noise and provide honest, data-driven analysis of desk gear. From standing desks to mechanical keyboards, every product we feature has been evaluated for build quality, long-term durability, and ergonomic value.</p>
                    </>
                ),
                privacy: (
                    <>
                        <p>Your privacy is critically important to us. At Tech Desk Review, we have a few fundamental principles:</p>
                        <ul className="list-disc pl-6 space-y-2">
                            <li>We don’t ask you for personal information unless we truly need it.</li>
                            <li>We don’t share your personal information with anyone except to comply with the law, develop our products, or protect our rights.</li>
                        </ul>
                        <h3 className="text-white font-bold text-xl mt-6">Cookies</h3>
                        <p>We use cookies to help identify and track visitors, their usage of our website, and their website access preferences.</p>
                    </>
                ),
                disclaimer: (
                    <>
                        <p><strong>Tech Desk Review is reader-supported.</strong> When you buy through links on our site, we may earn an affiliate commission.</p>
                        <p>Tech Desk Review is a participant in the Amazon Services LLC Associates Program, an affiliate advertising program designed to provide a means for sites to earn advertising fees by advertising and linking to Amazon.com.</p>
                        <p>This comes at <strong>no extra cost to you</strong>. Our reputation is our most valuable asset, and we only recommend products that we believe provide genuine value to our readers.</p>
                    </>
                )
            };

            return (
                <div className="min-h-screen bg-[#0b0f14] text-slate-200 font-sans selection:bg-[#FFD814] selection:text-black">
                    <Navbar isSearchOpen={isSearchOpen} setIsSearchOpen={setIsSearchOpen} setIsMobileMenuOpen={setIsMobileMenuOpen} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onSearchSubmit={handleSearchSubmit} onReset={handleReset} setCurrentView={setCurrentView} />
                    <MobileMenu isOpen={isMobileMenuOpen} onClose={() => setIsMobileMenuOpen(false)} setCurrentView={setCurrentView} setSelectedCategory={setSelectedCategory} />
                    <main className="transition-opacity duration-300">
                        {currentView === 'home' ? <HomeView products={PRODUCTS} selectedCategory={selectedCategory} searchQuery={searchQuery} setSelectedCategory={setSelectedCategory} setSearchQuery={setSearchQuery} setSelectedProduct={setSelectedProduct} setCurrentView={setCurrentView} /> :
                         currentView === 'categories' ? <CategoriesView setCurrentView={setCurrentView} setSelectedCategory={setSelectedCategory} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onSearchSubmit={handleSearchSubmit} /> :
                         currentView === 'review' ? <ReviewView product={selectedProduct} setCurrentView={setCurrentView} /> :
                         currentView === 'about' ? <StaticView title="About Us" content={staticContent.about} setCurrentView={setCurrentView} /> :
                         currentView === 'privacy' ? <StaticView title="Privacy Policy" content={staticContent.privacy} setCurrentView={setCurrentView} /> :
                         currentView === 'disclaimer' ? <StaticView title="Affiliate Disclaimer" content={staticContent.disclaimer} setCurrentView={setCurrentView} /> : null
                        }
                    </main>
                    <footer className="bg-[#0b0f14] border-t border-[#1f2933] py-20 text-center mt-20">
                        <button className="text-2xl font-black text-white uppercase mb-8 cursor-pointer focus:outline-none" onClick={handleReset}>Tech Desk.</button>
                        <div className="flex justify-center gap-8 text-xs font-bold text-slate-600 uppercase tracking-widest cursor-pointer">
                            <button onClick={() => setCurrentView('privacy')} className="hover:text-white focus:outline-none">Privacy</button>
                            <button onClick={() => setCurrentView('disclaimer')} className="hover:text-white focus:outline-none">Affiliate</button>
                        </div>
                        <p className="mt-8 text-xs text-slate-700">© {new Date().getFullYear()} Tech Desk Review.</p>
                    </footer>
                    {showCookieBanner && <CookieBanner onAccept={acceptCookies} />}
                    {currentView === 'review' && selectedProduct && (
                        <div className="md:hidden fixed bottom-0 left-0 right-0 p-4 bg-[#0b0f14]/90 backdrop-blur-lg border-t border-white/10 z-50">
                            <AmazonBtn text="Check Price" link={selectedProduct.amazonLink} />
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<EditorialDarkBlog />);
    </script>
</body>
</html>
